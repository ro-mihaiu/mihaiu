  <link rel="stylesheet" href="../CSS/style.css" />

<body>
  <div class="page-transition"></div>

  <nav class="navbar">
    <div class="logo"><a href="../index.html">mihaiu.zapto.org</a></div>
    <ul class="nav-links">
      <li><a href="../index.html" class="nav-link">Home</a></li>

    </ul>

  <main>
    <section class="simple-hero reveal">
      <div class="container">
        <h2>Contact</h2>
        <p class="subtitle">Contact me for more details about future projects, or simply say hello!</p>
      </div>
    </section>
    <div class="section-separator"></div>
    <section class="contact">
      <div class="container">
        <form action="mailto:mihaiu.dev@gmail.com" method="post" enctype="text/plain" class="contact-form">
          <input type="text" name="name" placeholder="Your Name" class="form-input" required>
          <input type="email" name="email" placeholder="your@email.com" class="form-input" required>
          <textarea name="message" placeholder="Your message" rows="5" class="form-input" required></textarea>
          <button type="submit" class="form-button">Send Message</button>
        </form>
      </div>
    </section>
  </main>
  <footer class="footer">
    <div class="container footer-inner">
      <div class="footer-links">
        <a href="https://discord.com/users/1027052856697684099" class="footer-icon discord" target="_blank"
          rel="noopener noreferrer" aria-label="Discord"><i class="fab fa-discord"></i></a>
        <a href="https://github.com/ro-mihaiu" class="footer-icon github" target="_blank" rel="noopener noreferrer"
          aria-label="GitHub"><i class="fab fa-github"></i></a>
        <a href="https://instagram.com/ro_mihaiu" class="footer-icon instagram" target="_blank"
          rel="noopener noreferrer" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
      </div>
      <div class="footer-meta">
        <p>&copy; 2026 Mihai | Built with passion</p>
        <p><a href="mailto:mihaiu.dev@gmail.com" class="gradient-email">mihaiu.dev@gmail.com</a></p>
      </div>
    </div>

  <script src="../JS/script.js"></script>
